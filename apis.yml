aid: pci-compliance
name: PCI Compliance
description: >-
  Payment Card Industry Data Security Standard (PCI DSS) is a set of security
  standards designed to ensure that all companies that accept, process, store
  or transmit credit card information maintain a secure environment. It plays a
  critical role in protecting organizational assets and maintaining a strong
  security posture. The PCI Security Standards Council does not currently
  publish a public REST API.
